<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FishyNW | Weather, Wind, Best Times + Tools</title>
  <meta name="description" content="FishyNW: Weather, wind, best fishing times, trolling depth, and GPS speed." />
  <meta name="theme-color" content="#8fd19e" />
  <style>
    /* Keep the page clean. app.js injects all the styling you need. */
    html, body { height: 100%; }
    body { margin: 0; }
    /* If app.js fails to load, at least show a readable message */
    #appFallback {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 16px;
    }
  </style>
</head>
<body>
  <main id="app">
    <div id="appFallback">
      Loading FishyNW tools... If this stays here, make sure <b>app.js</b> is in the same folder as this file.
    </div>
  </main>

  <!-- Load your single-file app -->
  <script src="app.js"></script>
</body>
</html>
